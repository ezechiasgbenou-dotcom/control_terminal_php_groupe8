<!-- Partial : Profil public -->

<div class="cover">
  <img id="pubCoverImg" src="assets/images/default-cover.jpg" alt="">
</div>

<div class="profile-header">
  <div class="profile-avatar-wrap">
    <img id="pubAvatarImg" src="assets/images/default-avatar.png" alt="">
  </div>
  <div class="profile-meta">
    <h1 id="pubProfileName">…</h1>
    <div class="sub" id="pubProfileSub">…</div>
  </div>
  <div id="pubFriendActions" style="margin-bottom:20px;display:flex;gap:8px"></div>
</div>

<div class="profile-tabs">
  <div class="profile-tab active" onclick="pubSwitchTab('posts',this)">Publications</div>
  <div class="profile-tab" onclick="pubSwitchTab('about',this)">À propos</div>
  <div class="profile-tab" onclick="pubSwitchTab('friends',this)">Amis</div>
</div>

<div class="profile-body">
  <aside>
    <div class="card" style="padding:16px">
      <h4 style="margin-bottom:8px">À propos</h4>
      <div class="info-row"><i class="ph ph-briefcase"></i><span id="pubJob">—</span></div>
      <div class="info-row"><i class="ph ph-graduation-cap"></i><span id="pubSchool">—</span></div>
      <div class="info-row"><i class="ph ph-map-pin"></i><span id="pubCity">—</span></div>
      <div class="info-row"><i class="ph ph-calendar-blank"></i><span id="pubJoined">—</span></div>
    </div>
  </aside>

  <main>
    <div class="tab-content active" id="pub-tab-posts">
      <div id="pubPostsContainer"><div class="card post skeleton" style="height:160px"></div></div>
    </div>
    <div class="tab-content" id="pub-tab-about">
      <div class="card" style="padding:24px">
        <h4 style="margin-bottom:16px">À propos</h4>
        <div class="info-row"><i class="ph ph-briefcase"></i><span id="pubJob2">—</span></div>
        <div class="info-row"><i class="ph ph-graduation-cap"></i><span id="pubSchool2">—</span></div>
        <div class="info-row"><i class="ph ph-map-pin"></i><span id="pubCity2">—</span></div>
        <div class="info-row"><i class="ph ph-calendar-blank"></i><span id="pubJoined2">—</span></div>
        <div class="info-row"><i class="ph ph-text-align-left"></i><span id="pubBio" style="font-style:italic">—</span></div>
      </div>
    </div>
    <div class="tab-content" id="pub-tab-friends">
      <div id="pubFriendsGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px"></div>
    </div>
  </main>
</div>

<script>
(function(){
  requireClientAuth();
  setLayout('wide');
  var me = getStoredUser();
  document.getElementById('col-right').innerHTML = '';

  var targetId = window.__routeParams ? window.__routeParams.get('id') : null;
  if (!targetId) { Router.navigate('accueil'); return; }

  window.pubSwitchTab = function(name, el){
    document.querySelectorAll('.profile-tab').forEach(function(t){ t.classList.remove('active'); });
    document.querySelectorAll('#pub-tab-posts, #pub-tab-about, #pub-tab-friends').forEach(function(t){ t.classList.remove('active'); });
    el.classList.add('active');
    document.getElementById('pub-tab-'+name).classList.add('active');
    if (name === 'friends') loadPubFriends();
  };

  function fillInfo(p){
    var joined = 'Membre depuis le ' + new Date(p.created_at.replace(' ','T')).toLocaleDateString('fr-FR');
    ['pubJob','pubJob2'].forEach(function(id){ var el=document.getElementById(id); if(el) el.textContent=p.job||'Non renseigné'; });
    ['pubSchool','pubSchool2'].forEach(function(id){ var el=document.getElementById(id); if(el) el.textContent=p.school||'Non renseigné'; });
    ['pubCity','pubCity2'].forEach(function(id){ var el=document.getElementById(id); if(el) el.textContent=p.city||'Non renseigné'; });
    ['pubJoined','pubJoined2'].forEach(function(id){ var el=document.getElementById(id); if(el) el.textContent=joined; });
    var bio=document.getElementById('pubBio'); if(bio) bio.textContent=p.bio||'Aucune biographie renseignée.';
  }

  async function loadProfile(){
    try{
      var data = await apiCall('profile/get.php?id='+targetId);
      var p = data.profile;

      // Si c'est son propre profil → aller sur #profil
      if (p.is_me){ Router.navigate('profil'); return; }

      document.getElementById('pubCoverImg').src = p.cover ? avatarUrl(p.cover) : 'assets/images/default-cover.jpg';
      document.getElementById('pubAvatarImg').src = avatarUrl(p.avatar);
      document.getElementById('pubProfileName').textContent = p.first_name+' '+p.last_name;
      document.getElementById('pubProfileSub').textContent = p.friend_count+' ami'+(p.friend_count>1?'s':'')+(p.city?' · '+p.city:'');
      fillInfo(p);

      // Boutons d'action (ami/message)
      var friendData = await apiCall('friends/list.php');
      var rel = friendData.users.find(function(u){ return u.id == targetId; });
      var status    = rel ? rel.status    : 'none';
      var direction = rel ? rel.direction : null;
      var box = document.getElementById('pubFriendActions');
      box.innerHTML = '';

      if (status === 'none'){
        var btn=document.createElement('button'); btn.className='btn btn-primary';
        btn.innerHTML='<i class="ph ph-user-plus"></i> Ajouter en ami';
        btn.onclick=async function(){
          btn.disabled=true;
          try{ await apiCall('friends/request.php',{method:'POST',body:{user_id:Number(targetId)}}); showToast("Demande envoyée",'ph-check-circle'); btn.textContent='Demande envoyée'; }
          catch(err){ showToast(err.message,'ph-warning-circle'); btn.disabled=false; }
        };
        box.appendChild(btn);
      } else if (status==='pending' && direction==='sent'){
        var btn=document.createElement('button'); btn.className='btn btn-ghost'; btn.disabled=true;
        btn.innerHTML='<i class="ph ph-clock"></i> Demande envoyée';
        box.appendChild(btn);
      } else if (status==='pending' && direction==='received'){
        var b1=document.createElement('button'); b1.className='btn btn-primary';
        b1.innerHTML='<i class="ph ph-check"></i> Accepter';
        b1.onclick=async function(){ await apiCall('friends/respond.php',{method:'POST',body:{user_id:Number(targetId),action:'accept'}}); showToast('Demande acceptée','ph-check-circle'); loadProfile(); };
        var b2=document.createElement('button'); b2.className='btn btn-ghost';
        b2.innerHTML='Refuser';
        b2.onclick=async function(){ await apiCall('friends/respond.php',{method:'POST',body:{user_id:Number(targetId),action:'decline'}}); loadProfile(); };
        box.appendChild(b1); box.appendChild(b2);
      } else if (status==='accepted'){
        var btn=document.createElement('button'); btn.className='btn btn-ghost';
        btn.innerHTML='<i class="ph ph-chat-circle-dots"></i> Envoyer un message';
        btn.onclick=function(){ Router.navigate('chat'); };
        box.appendChild(btn);
      }
    }catch(err){ showToast(err.message,'ph-warning-circle'); }
  }

  async function loadPubPosts(){
    var container=document.getElementById('pubPostsContainer');
    try{
      var data=await apiCall('posts/list.php?user_id='+targetId);
      container.innerHTML='';
      if(!data.posts.length){ container.innerHTML='<div class="card" style="padding:32px;text-align:center;color:var(--color-text-muted)">Aucune publication publique.</div>'; return; }
      data.posts.forEach(function(p){ container.appendChild(buildPubPost(p)); });
    }catch(err){ container.innerHTML='<p style="color:var(--color-danger)">'+err.message+'</p>'; }
  }

  function buildPubPost(p){
    var article=document.createElement('article');
    article.className='card post'; article.dataset.postId=p.id;
    var profileUrl=p.user_id==me.id?'#profil':'#profil-public?id='+p.user_id;
    article.innerHTML=
      '<div class="post-header">'+
        '<a href="'+profileUrl+'"><img class="avatar" src="'+avatarUrl(p.avatar)+'" width="46" height="46" alt=""></a>'+
        '<div class="post-author"><div class="name"><a href="'+profileUrl+'" style="color:inherit;text-decoration:none">'+p.first_name+' '+p.last_name+'</a></div><div class="meta">'+timeAgo(p.created_at)+'</div></div>'+
      '</div>'+
      '<div class="post-body"></div>'+
      (p.image?'<div class="post-image"><img src="'+avatarUrl(p.image)+'" alt=""></div>':'')+
      '<div class="post-stats"><div class="reactions"><span class="reaction-bubble"><i class="ph-fill ph-heart" style="font-size:10px"></i></span><span class="like-count-label">'+p.like_count+' réaction(s)</span></div><span class="comment-count-label">'+p.comment_count+' commentaire(s)</span></div>'+
      '<div class="post-buttons">'+
        '<button class="post-action '+(p.liked_by_me?'liked':'')+'" onclick="toggleLike(this)"><i class="ph '+(p.liked_by_me?'ph-fill':'')+' ph-heart"></i><span>J\'aime</span><span class="like-count" data-count="'+p.like_count+'" style="display:none"></span></button>'+
        '<button class="post-action" onclick="toggleComments(this)"><i class="ph ph-chat-circle"></i><span>Commenter</span></button>'+
      '</div>'+
      '<div class="comments"><div class="comment-list"></div><form class="comment-form" onsubmit="submitComment(this,event)"><input type="text" placeholder="Écrire un commentaire…"><button type="submit"><i class="ph-fill ph-paper-plane-tilt" style="font-size:14px"></i></button></form></div>';
    article.querySelector('.post-body').textContent=p.content;
    return article;
  }

  async function loadPubFriends(){
    var grid=document.getElementById('pubFriendsGrid');
    if(grid.dataset.loaded) return;
    try{
      var data=await apiCall('friends/list.php');
      var friends=data.users.filter(function(u){ return u.status==='accepted'; });
      grid.innerHTML=friends.length?'':'<p style="color:var(--color-text-muted)">Aucun ami commun.</p>';
      friends.forEach(function(u){
        var div=document.createElement('div'); div.className='card'; div.style.cssText='padding:12px;text-align:center;cursor:pointer';
        div.onclick=function(){ Router.navigate('profil-public',{id:u.id}); };
        div.innerHTML='<img class="avatar" src="'+avatarUrl(u.avatar)+'" width="64" height="64" style="margin:0 auto 8px" alt=""><div style="font-weight:600;font-size:var(--fs-sm)">'+u.first_name+' '+u.last_name+'</div>';
        grid.appendChild(div);
      });
      grid.dataset.loaded='1';
    }catch(err){}
  }

  loadProfile();
  loadPubPosts();
})();
</script>
