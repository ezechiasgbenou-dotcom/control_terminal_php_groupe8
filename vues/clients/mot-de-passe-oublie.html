<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mot de passe oublié — Lien</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="../../assets/css/variables.css">
<link rel="stylesheet" href="../../assets/css/main.css">
<style>
  body{ background:var(--color-bg); display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .panel{ width:100%; max-width:400px; padding:var(--space-5); }
  .logo{ font-family:var(--font-display); font-size:1.8rem; font-weight:700; color:var(--color-primary); margin-bottom:var(--space-2); text-align:center; }
  .logo .dot{ color:var(--color-accent); }
  .lead{ text-align:center; color:var(--color-text-secondary); font-size:var(--fs-sm); margin-bottom:var(--space-5); }
</style>
</head>
<body>
  <div class="card panel">
    <div class="logo">Lien<span class="dot">.</span></div>
    <p class="lead">Indiquez votre adresse e-mail, nous vous enverrons un lien de réinitialisation.</p>
    <form id="forgotForm">
      <div class="field">
        <label>Adresse e-mail</label>
        <input type="email" id="email" required placeholder="vous@exemple.com">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Envoyer le lien</button>
      <p style="text-align:center; margin-top:var(--space-4); font-size:var(--fs-sm)">
        <a href="../../index.html"><i class="ph ph-arrow-left"></i> Retour à la connexion</a>
      </p>
    </form>
  </div>

<script src="../../assets/js/interactions.js"></script>
<script src="../../assets/js/api.js"></script>
<script>
document.getElementById('forgotForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const btn = e.target.querySelector('button');
  btn.disabled = true; btn.textContent = 'Envoi…';
  try{
    const data = await apiCall('auth/forgot-password.php', { method:'POST', body:{ email: document.getElementById('email').value }});
    showToast(data.message, 'ph-check-circle');
  }catch(err){
    showToast(err.message, 'ph-warning-circle');
  }finally{
    btn.disabled = false; btn.textContent = 'Envoyer le lien';
  }
});
</script>
</body>
</html>
