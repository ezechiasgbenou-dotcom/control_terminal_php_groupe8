<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmation d'e-mail — Lien</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
<link rel="stylesheet" href="../../assets/css/variables.css">
<link rel="stylesheet" href="../../assets/css/main.css">
<style>
  body{ background:var(--color-bg); display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .panel{ width:100%; max-width:420px; padding:var(--space-6); text-align:center; }
  .logo{ font-family:var(--font-display); font-size:1.8rem; font-weight:700; color:var(--color-primary); margin-bottom:var(--space-4); }
  .logo .dot{ color:var(--color-accent); }
  .icon{ font-size:48px; margin-bottom:var(--space-3); }
  .icon.ok{ color:var(--color-success); }
  .icon.fail{ color:var(--color-danger); }
  p{ color:var(--color-text-secondary); margin-bottom:var(--space-5); }
</style>
</head>
<body>
  <div class="card panel" id="panel">
    <div class="logo">Lien<span class="dot">.</span></div>
    <div class="icon"><i class="ph ph-circle-notch" style="animation:spin 1s linear infinite"></i></div>
    <p id="message">Vérification de votre adresse e-mail…</p>
  </div>

<script src="../../assets/js/api.js"></script>
<style>@keyframes spin{ to{ transform:rotate(360deg); } }</style>
<script>
(async ()=>{
  const token = new URLSearchParams(location.search).get('token');
  const panel = document.getElementById('panel');
  const message = document.getElementById('message');
  if (!token){
    panel.querySelector('.icon').innerHTML = '<i class="ph ph-x-circle"></i>';
    panel.querySelector('.icon').classList.add('fail');
    message.textContent = 'Lien de confirmation invalide.';
    return;
  }
  try{
    const data = await apiCall(`auth/verify.php?token=${encodeURIComponent(token)}`);
    panel.querySelector('.icon').innerHTML = '<i class="ph-fill ph-check-circle"></i>';
    panel.querySelector('.icon').classList.add('ok');
    message.textContent = data.message;
    const btn = document.createElement('a');
    btn.href = '../../index.html';
    btn.className = 'btn btn-primary btn-block';
    btn.textContent = 'Se connecter';
    panel.appendChild(btn);
  }catch(err){
    panel.querySelector('.icon').innerHTML = '<i class="ph ph-x-circle"></i>';
    panel.querySelector('.icon').classList.add('fail');
    message.textContent = err.message;
  }
})();
</script>
</body>
</html>
