<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réinitialiser le mot de passe — Lien</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="../../assets/css/variables.css">
<link rel="stylesheet" href="../../assets/css/main.css">
<style>
  body{ background:var(--color-bg); display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .panel{ width:100%; max-width:400px; padding:var(--space-5); }
  .logo{ font-family:var(--font-display); font-size:1.8rem; font-weight:700; color:var(--color-primary); margin-bottom:var(--space-2); text-align:center; }
  .logo .dot{ color:var(--color-accent); }
</style>
</head>
<body>
  <div class="card panel">
    <div class="logo">Lien<span class="dot">.</span></div>
    <form id="resetForm">
      <div class="field">
        <label>Nouveau mot de passe</label>
        <input type="password" id="password" required minlength="8" placeholder="8 caractères minimum">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Réinitialiser</button>
    </form>
  </div>

<script src="../../assets/js/interactions.js"></script>
<script src="../../assets/js/api.js"></script>
<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) showToast("Lien de réinitialisation invalide.", 'ph-warning-circle');

document.getElementById('resetForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const btn = e.target.querySelector('button');
  btn.disabled = true; btn.textContent = 'Réinitialisation…';
  try{
    const data = await apiCall('auth/reset-password.php', { method:'POST', body:{ token, password: document.getElementById('password').value }});
    showToast(data.message, 'ph-check-circle');
    setTimeout(()=> window.location.href = '../../index.html', 1500);
  }catch(err){
    showToast(err.message, 'ph-warning-circle');
  }finally{
    btn.disabled = false; btn.textContent = 'Réinitialiser';
  }
});
</script>
</body>
</html>
