<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Back-office — Lien</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="../../assets/css/variables.css">
<link rel="stylesheet" href="../../assets/css/main.css">
<style>
  body{ background:var(--color-primary); display:flex; align-items:center; justify-content:center; min-height:100vh;
    background-image:radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05), transparent 40%); }
  .panel{ width:100%; max-width:380px; padding:var(--space-5); }
  .logo{ font-family:var(--font-display); font-size:1.8rem; font-weight:700; color:var(--color-primary); margin-bottom:4px; text-align:center; }
  .logo .dot{ color:var(--color-accent); }
  .tag{ text-align:center; color:var(--color-text-muted); font-size:var(--fs-xs); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:var(--space-5); }
</style>
</head>
<body>
  <div class="card panel">
    <div class="logo">Lien<span class="dot">.</span></div>
    <p class="tag"><i class="ph ph-shield-check"></i> Espace administration</p>
    <form id="loginForm">
      <div class="field">
        <label>Adresse e-mail</label>
        <input type="email" id="email" required placeholder="admin@lien.test">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Accéder au back-office</button>
      <p style="text-align:center; margin-top:var(--space-4); font-size:var(--fs-sm)">
        <a href="../../index.html"><i class="ph ph-arrow-left"></i> Retour au site</a>
      </p>
    </form>
  </div>

<script src="../../assets/js/interactions.js"></script>
<script src="../../assets/js/api.js"></script>
<script>
if (getToken() && getStoredUser() && ['admin','moderator'].includes(getStoredUser().role)){
  window.location.href = 'tableau-de-bord.html';
}

document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const btn = e.target.querySelector('button');
  btn.disabled = true; btn.textContent = 'Connexion…';
  try{
    const data = await apiCall('admin/login.php', { method:'POST', body:{
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
    }});
    setSession(data.token, data.user);
    window.location.href = 'tableau-de-bord.html';
  }catch(err){
    showToast(err.message, 'ph-warning-circle');
  }finally{
    btn.disabled = false; btn.textContent = 'Accéder au back-office';
  }
});
</script>
</body>
</html>
